<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Yasmin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .container { padding: 40px; }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 32px; margin-bottom: 16px; }
        p { font-size: 18px; opacity: 0.9; margin-bottom: 30px; }
        .retry-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .retry-btn:hover { transform: scale(1.05); }
        .cached-data {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            max-width: 500px;
        }
        .cached-data h3 { margin-bottom: 10px; }
        .cached-item {
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            margin: 5px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>Don't worry! Yasmin works offline. Your changes will sync when you're back online.</p>
        <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>

        <div class="cached-data" id="cachedData">
            <h3>📦 Cached Data</h3>
            <div id="cachedItems">Loading...</div>
        </div>
    </div>

    <script>
        // Show cached data
        async function showCachedData() {
            const container = document.getElementById('cachedItems');
            try {
                const cache = await caches.open('yasmin-dynamic-v1');
                const keys = await cache.keys();
                const items = keys.slice(0, 5).map(r => `<div class="cached-item">${new URL(r.url).pathname}</div>`);
                container.innerHTML = items.join('') || '<div class="cached-item">No cached data yet</div>';
            } catch (e) {
                container.innerHTML = '<div class="cached-item">Cache not available</div>';
            }
        }
        showCachedData();
    </script>
</body>
</html>
