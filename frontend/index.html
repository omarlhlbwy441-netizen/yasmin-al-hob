<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>ياسمين - جاري التوجيه...</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0F0A1E;
            color: white;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .loader-container { text-align: center; padding: 20px; }
        .spinner {
            width: 60px; height: 60px;
            border: 3px solid rgba(124, 58, 237, 0.2);
            border-top-color: #7C3AED;
            border-right-color: #EC4899;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .logo {
            font-size: 32px; font-weight: 700;
            background: linear-gradient(135deg, #7C3AED, #EC4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .message { color: #9CA3AF; font-size: 16px; margin-bottom: 20px; }
        .manual-link {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #7C3AED, #EC4899);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <div class="logo">ياسمين</div>
        <p class="message">...</p>
        <a href="login.html" class="manual-link">اضغط هنا للدخول</a>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = 'login.html';
        }, 1000);
    </script>
</body>
</html>
