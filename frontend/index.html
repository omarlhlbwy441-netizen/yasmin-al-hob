<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ياسمين - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        tajawal: ['Tajawal', 'sans-serif'],
                    },
                    colors: {
                        yasmin: {
                            primary: '#7C3AED',    // بنفسجي غامق
                            secondary: '#EC4899',   // وردي
                            accent: '#8B5CF6',      // بنفسجي فاتح
                            dark: '#1E1B4B',        // كحلي غامق
                            surface: '#0F0A1E',     // خلفية داكنة
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(124, 58, 237, 0.5)' },
                            '100%': { boxShadow: '0 0 20px rgba(124, 58, 237, 0.8), 0 0 40px rgba(236, 72, 153, 0.4)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0F0A1E;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 27, 75, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(124, 58, 237, 0.2);
        }

        .gradient-text {
            background: linear-gradient(135deg, #7C3AED 0%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-field {
            background: rgba(15, 10, 30, 0.6);
            border: 1px solid rgba(124, 58, 237, 0.3);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 15px rgba(124, 58, 237, 0.3);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7C3AED 0%, #EC4899 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #EC4899);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }

        .social-btn {
            background: rgba(30, 27, 75, 0.6);
            border: 1px solid rgba(124, 58, 237, 0.2);
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background: rgba(124, 58, 237, 0.2);
            border-color: #7C3AED;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">

    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="particle w-64 h-64 top-10 right-10 blur-3xl"></div>
        <div class="particle w-96 h-96 bottom-20 left-20 blur-3xl" style="animation-delay: 2s;"></div>
        <div class="particle w-48 h-48 top-1/2 left-1/2 blur-2xl" style="animation-delay: 4s;"></div>
    </div>

    <div class="fixed inset-0 opacity-10" style="background-image: radial-gradient(circle at 1px 1px, rgba(124, 58, 237, 0.3) 1px, transparent 0); background-size: 40px 40px;"></div>

    <div class="container mx-auto px-4 relative z-10">
        <div class="max-w-5xl mx-auto flex flex-col lg:flex-row items-center gap-12">

            <div class="lg:w-1/2 text-center lg:text-right">
                <div class="mb-8">
                    <div class="inline-flex items-center gap-3 mb-6">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-yasmin-primary to-yasmin-secondary flex items-center justify-center animate-glow">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <h1 class="text-4xl font-bold gradient-text">ياسمين</h1>
                    </div>
                    <p class="text-gray-400 text-lg leading-relaxed mb-6">
                        منصة الذكاء الاصطناعي المتوازي لبناء التطبيقات والمواقع والألعاب والأنظمة بسهولة وسرعة فائقة
                    </p>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center gap-3 text-gray-300">
                        <div class="w-8 h-8 rounded-lg bg-yasmin-primary/20 flex items-center justify-center">
                            <svg class="w-4 h-4 text-yasmin-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <span>وكلاء ذكاء اصطناعي متوازيين</span>
                    </div>
                    <div class="flex items-center gap-3 text-gray-300">
                        <div class="w-8 h-8 rounded-lg bg-yasmin-secondary/20 flex items-center justify-center">
                            <svg class="w-4 h-4 text-yasmin-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <span>بناء سريع بدون برمجة معقدة</span>
                    </div>
                    <div class="flex items-center gap-3 text-gray-300">
                        <div class="w-8 h-8 rounded-lg bg-yasmin-accent/20 flex items-center justify-center">
                            <svg class="w-4 h-4 text-yasmin-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/>
                            </svg>
                        </div>
                        <span>تخصيص كامل للمشاريع</span>
                    </div>
                </div>
            </div>

            <div class="lg:w-1/2 w-full">
                <div class="glass-panel rounded-3xl p-8 md:p-10 shadow-2xl">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-white mb-2">مرحباً بعودتك</h2>
                        <p class="text-gray-400">سجل الدخول إلى حسابك في ياسمين</p>
                    </div>

                    <form id="loginForm" class="space-y-5">
                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-2">البريد الإلكتروني</label>
                            <div class="relative">
                                <input 
                                    type="email" 
                                    id="email"
                                    class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-right"
                                    placeholder="أدخل بريدك الإلكتروني"
                                    required
                                >
                                <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                                </svg>
                            </div>
                        </div>

                        <div>
                            <label class="block text-gray-300 text-sm font-medium mb-2">كلمة المرور</label>
                            <div class="relative">
                                <input 
                                    type="password" 
                                    id="password"
                                    class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-right"
                                    placeholder="أدخل كلمة المرور"
                                    required
                                >
                                <button type="button" onclick="togglePassword()" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-300 transition">
                                    <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" class="w-4 h-4 rounded border-gray-600 text-yasmin-primary focus:ring-yasmin-primary bg-transparent">
                                <span class="text-gray-400 text-sm">تذكرني</span>
                            </label>
                            <a href="#" class="text-yasmin-primary hover:text-yasmin-secondary text-sm transition">نسيت كلمة المرور؟</a>
                        </div>

                        <button type="submit" class="btn-primary w-full py-3.5 rounded-xl text-white font-bold text-lg shadow-lg">
                            تسجيل الدخول
                        </button>
                    </form>

                    <div class="relative my-6">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-700"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-4 bg-yasmin-dark text-gray-500 rounded">أو</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button class="social-btn py-2.5 rounded-xl flex items-center justify-center gap-2 text-gray-300 hover:text-white">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            <span>Google</span>
                        </button>
                        <button class="social-btn py-2.5 rounded-xl flex items-center justify-center gap-2 text-gray-300 hover:text-white">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                            </svg>
                            <span>GitHub</span>
                        </button>
                    </div>

                    <div class="mt-6 text-center">
                        <p class="text-gray-400">
                            ليس لديك حساب؟ 
                            <a href="#" class="text-yasmin-primary hover:text-yasmin-secondary font-medium transition">سجل الآن</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // إظهار/إخفاء كلمة المرور
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                `;
            }
        }

        // معالجة النموذج
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // هنا يمكنك إضافة منطق المصادقة
            console.log('تسجيل الدخول:', { email, password });

            // تأثير تحميل
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mx-auto" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                window.location.href = 'dashboard.html'; // تم التعديل هنا للانتقال إلى الموقع
            }, 2000);
        });

        // تأثيرات حركية للخلفية
        document.addEventListener('mousemove', (e) => {
            const particles = document.querySelectorAll('.particle');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            particles.forEach((particle, index) => {
                const speed = (index + 1) * 20;
                particle.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body>
</html>
