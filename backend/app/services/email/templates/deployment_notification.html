<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Deployment Update</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 40px 0; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { background: {% if status == 'success' %}#28a745{% else %}#dc3545{% endif %}; padding: 40px; text-align: center; }
        .header h1 { color: white; margin: 0; }
        .content { padding: 40px; }
        .button { display: inline-block; background: {% if status == 'success' %}#28a745{% else %}#dc3545{% endif %}; color: white; padding: 14px 32px; text-decoration: none; border-radius: 8px; font-weight: 600; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{% if status == 'success' %}🚀 Deployment Successful!{% else %}❌ Deployment Failed{% endif %}</h1>
        </div>
        <div class="content">
            <h2>{{ project_name }}</h2>
            <p>Status: <strong>{{ status|upper }}</strong></p>
            {% if url %}<a href="{{ url }}" class="button">View Deployment</a>{% endif %}
        </div>
    </div>
</body>
</html>
